name: Testclient7 Weekly Report

on:
  schedule:
    # Every Sunday at 9:00 AM PST
    - cron: '0 17 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate and send report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TESTCLIENT7_PLUSVIBE_WORKSPACE_ID: ${{ secrets.TESTCLIENT7_PLUSVIBE_WORKSPACE_ID }}
          TESTCLIENT7_SLACK_CHANNEL_ID: ${{ secrets.TESTCLIENT7_SLACK_CHANNEL_ID }}
        run: node api/test-report.js testclient7

name: Test Weekly Report

on:
  schedule:
    # Every Sunday at 9:00 AM 8d8d2bba-ee59-4611-a6b1-929ef7d84407
    - cron: '0 14 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate and send report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEST_INSTANTLY_API_KEY: ${{ secrets.TEST_INSTANTLY_API_KEY }}
          TEST_SLACK_CHANNEL_ID: ${{ secrets.TEST_SLACK_CHANNEL_ID }}
        run: node api/test-report.js test

name: Phil Weekly Report

on:
  schedule:
    # Every Sunday at 5:00 UTC (9:00 AM Dubai time)
    - cron: '0 5 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate and send report
        env:
          PHIL_INSTANTLY_API_KEY: ${{ secrets.PHIL_INSTANTLY_API_KEY }}
          PHIL_SLACK_WEBHOOK: ${{ secrets.PHIL_SLACK_WEBHOOK }}
        run: node api/test-report.js phil

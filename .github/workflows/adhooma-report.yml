name: Adhooma Weekly Report

on:
  schedule:
    # Every Sunday at 9:00 AM 85937d11-ec56-4e77-9015-fa69d57c7887
    - cron: '0 14 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate and send report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ADHOOMA_INSTANTLY_API_KEY: ${{ secrets.ADHOOMA_INSTANTLY_API_KEY }}
          ADHOOMA_SLACK_CHANNEL_ID: ${{ secrets.ADHOOMA_SLACK_CHANNEL_ID }}
        run: node api/test-report.js adhooma
